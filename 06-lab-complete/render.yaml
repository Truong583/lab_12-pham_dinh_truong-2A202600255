services:
  - type: web
    name: ai-agent-production
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ENVIRONMENT
        value: production
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: redis-internal
          type: redis
          property: connectionString

  - type: redis
    name: redis-internal
    ipAllowList: [] # Chỉ cho phép nội bộ
